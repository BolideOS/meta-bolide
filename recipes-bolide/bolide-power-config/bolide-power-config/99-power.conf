# BolideOS power-optimized sysctl settings
# VM: defer writes to reduce disk wakeups
vm.dirty_ratio = 30
vm.dirty_background_ratio = 10
vm.dirty_writeback_centisecs = 6000
vm.dirty_expire_centisecs = 6000
vm.vfs_cache_pressure = 50
vm.page-cluster = 0
vm.laptop_mode = 1

# Disable watchdog timer wakeups
kernel.watchdog = 0
kernel.nmi_watchdog = 0
kernel.hung_task_timeout_secs = 0

# Reduce scheduler overhead
kernel.sched_child_runs_first = 1
kernel.sched_migration_cost_ns = 5000000

# Reduce inotify overhead
fs.inotify.max_user_watches = 128
fs.inotify.max_user_instances = 64
