# BolideOS Ultra-Low Power Kernel Config Fragment
# Target: 0.2%/hr (0.86mA average) on beluga (msm8909w, 430mAh)
#
# Apply on top of stock defconfig to strip waste and maximize suspend residency.

# ============================================================
# CPU FREQUENCY: schedutil instead of performance
# Performance governor locks CPU at max freq = max power draw
# ============================================================
# CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE is not set
CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
CONFIG_CPU_FREQ_GOV_POWERSAVE=y
CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y

# ============================================================
# DISABLE WATCHDOG TIMERS — periodic interrupts that wake CPUs
# ============================================================
# CONFIG_QCOM_WATCHDOG_V2 is not set
# CONFIG_WQ_WATCHDOG is not set
# CONFIG_WATCHDOG is not set
# CONFIG_SOFT_WATCHDOG is not set

# ============================================================
# DISABLE DEBUG/PROFILING — reduces code paths and overhead
# ============================================================
# CONFIG_PROFILING is not set
# CONFIG_SCHED_DEBUG is not set
# CONFIG_DEBUG_FS is not set
# CONFIG_DEBUG_KERNEL is not set
# CONFIG_FTRACE is not set
# CONFIG_FUNCTION_TRACER is not set
# CONFIG_BT_DEBUGFS is not set
# CONFIG_USB_GADGET_DEBUG_FILES is not set
# CONFIG_USB_GADGET_DEBUG_FS is not set
# CONFIG_SPMI_MSM_PMIC_ARB_DEBUG is not set
# CONFIG_MSM_IDLE_STATS is not set
# CONFIG_SND_VERBOSE_PROCFS is not set

# ============================================================
# BLUETOOTH: make modular so it can be fully unloaded at idle
# (saves ~2-3mA from WCNSS idle current)
# ============================================================
CONFIG_BT=m
CONFIG_BT_BREDR=y
CONFIG_BT_RFCOMM=m
CONFIG_BT_RFCOMM_TTY=y
CONFIG_BT_BNEP=m
CONFIG_BT_HIDP=m
CONFIG_BT_LE=y
CONFIG_BT_HCIVHCI=m
CONFIG_BTFM_SLIM=m
CONFIG_BTFM_SLIM_WCN3990=m

# ============================================================
# SOUND: make modular (watch rarely needs audio)
# ============================================================
CONFIG_SOUND=m
CONFIG_SND=m
CONFIG_SND_SOC=m

# ============================================================
# USB GADGET: strip unnecessary functions
# Keep only serial (adb) and mass storage (for recovery)
# ============================================================
# CONFIG_USB_F_MIDI is not set
# CONFIG_USB_F_MTP is not set
# CONFIG_USB_F_AUDIO_SRC is not set
# CONFIG_USB_F_ACC is not set
# CONFIG_USB_CONFIGFS_F_MTP is not set
# CONFIG_USB_CONFIGFS_F_ACC is not set
# CONFIG_USB_CONFIGFS_F_AUDIO_SRC is not set
# CONFIG_USB_CONFIGFS_F_MIDI is not set

# ============================================================
# WLAN: keep core but strip all vendor drivers we don't use
# beluga uses WCNSS/Pronto for WiFi, not USB/PCI WiFi
# ============================================================
# CONFIG_WLAN_VENDOR_ADMTEK is not set
# CONFIG_WLAN_VENDOR_ATMEL is not set
# CONFIG_WLAN_VENDOR_BROADCOM is not set
# CONFIG_WLAN_VENDOR_CISCO is not set
# CONFIG_WLAN_VENDOR_INTEL is not set
# CONFIG_WLAN_VENDOR_INTERSIL is not set
# CONFIG_WLAN_VENDOR_MARVELL is not set
# CONFIG_WLAN_VENDOR_MEDIATEK is not set
# CONFIG_WLAN_VENDOR_RALINK is not set
# CONFIG_WLAN_VENDOR_REALTEK is not set
# CONFIG_WLAN_VENDOR_RSI is not set
# CONFIG_WLAN_VENDOR_ST is not set
# CONFIG_WLAN_VENDOR_TI is not set
# CONFIG_WLAN_VENDOR_ZYDAS is not set

# ============================================================
# THERMAL: keep but disable excessive polling
# ============================================================
# CONFIG_THERMAL_WRITABLE_TRIPS is not set

# ============================================================
# INPUT: disable mouse (no mouse on watch)
# ============================================================
# CONFIG_INPUT_MOUSE is not set
# CONFIG_INPUT_LEDS is not set

# ============================================================
# SUSPEND OPTIMIZATION
# ============================================================
CONFIG_SUSPEND_SKIP_SYNC=y
CONFIG_PM_AUTOSLEEP=y
CONFIG_PM_WAKELOCKS=y
CONFIG_PM_WAKELOCKS_GC=y

# ============================================================
# TIMER: already good (NO_HZ_IDLE, HZ=100)
# Keep HIGH_RES_TIMERS for accurate suspend wakeup
# ============================================================
CONFIG_NO_HZ_IDLE=y
CONFIG_HZ_100=y
CONFIG_HIGH_RES_TIMERS=y
CONFIG_RCU_FAST_NO_HZ=y

# ============================================================
# MMC: enable aggressive power saving
# ============================================================
CONFIG_MMC_CLKGATE=y
CONFIG_MMC_BLOCK_DEFERRED_RESUME=y

# ============================================================
# PRINTK: reduce wake-from-suspend logging spam
# ============================================================
CONFIG_PRINTK=y
# CONFIG_PRINTK_TIME is not set
